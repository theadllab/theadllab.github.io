<title>Ahra Roh — OT-Tech Specialist</title>

<style>
  :root {
    --bg-color: #FAFAFA;
    --text-main: #09090B;
    --text-muted: #52525B;
    --accent: #E11D48;
    --surface: #FFFFFF;
    --border: #ECECEF;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-size: 16px;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg-color);
    color: var(--text-main);
    line-height: 1.65;
    overflow-x: hidden;
  }

  html[lang="ko"] body {
    font-family: 'Pretendard', 'Inter', system-ui, sans-serif;
    line-height: 1.75;
  }

  h1, h2, h3, p, span, li {
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  h1, h2, h3, .nav-brand, .eyebrow, .btn-primary, .btn-secondary, .lang-btn {
    font-family: 'Space Grotesk', 'Pretendard', sans-serif;
  }

  ::selection { background: var(--text-main); color: var(--bg-color); }
  img { max-width: 100%; display: block; }
  a { color: inherit; }

  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }

  html[lang="en"] .ko { display: none; }
  html[lang="ko"] .en { display: none; }

  .skip-link {
    position: absolute; top: -48px; left: 0; background: var(--text-main); color: var(--bg-color);
    padding: 12px 20px; z-index: 300; text-decoration: none; font-size: 1rem; transition: top 0.2s;
  }
  .skip-link:focus { top: 0; }

  /* Navigation */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(250, 250, 250, 0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid transparent;
    transition: box-shadow 0.4s ease, border-color 0.4s ease, background 0.4s ease;
  }
  nav.scrolled {
    border-bottom: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
    background: rgba(255, 255, 255, 0.9);
  }

  .nav-inner {
    max-width: 1400px; margin: 0 auto; padding: 0 clamp(1rem, 4vw, 3rem);
    height: 76px; display: flex; align-items: center; justify-content: space-between;
  }

  .nav-brand {
    font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; text-decoration: none;
    display: flex; align-items: center; gap: 0.5rem; color: var(--text-main);
  }
  
  .nav-brand-tag {
    font-size: 0.72rem; font-weight: 600; color: var(--surface); background: var(--text-main);
    padding: 3px 8px; border-radius: 999px; letter-spacing: 0.03em; white-space: nowrap;
  }

  .nav-right { display: flex; align-items: center; gap: 1.25rem; }
  .nav-links { display: flex; gap: 1.75rem; list-style: none; }
  .nav-links a {
    font-size: 0.92rem; font-weight: 500; text-decoration: none; color: var(--text-main);
    transition: color 0.2s; position: relative;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px;
    background: var(--text-main); transition: width 0.3s ease;
  }
  .nav-links a:hover::after { width: 100%; }
